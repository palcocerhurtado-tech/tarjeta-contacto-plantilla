<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Tarjeta de Contacto</title>
    <style>
        :root {
            --color-principal: #d4af37;
            --color-principal-claro: #f0d570;
            --color-fondo: #1a1a1a;
            --color-fondo-claro: #2d2d2d;
            --color-fondo-oscuro: #0f0f0f;
            --color-acento: #764ba2;
            --color-acento-claro: #9b6bc9;
            --principal-rgb: 212, 175, 55;
            --acento-rgb: 118, 75, 162;
            --fondo-rgb: 26, 26, 26;
            --card-radius: 18px;
            --item-radius: 11px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        body {
            min-height: 100%; width: 100%;
            font-family: 'Segoe UI', Helvetica, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background: linear-gradient(135deg, var(--color-fondo-oscuro) 0%, var(--color-fondo) 100%);
            background-attachment: fixed;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
        }
        .container { width: 100%; max-width: 420px; margin: auto; }

        /* ── CARD BASE ── */
        .wallet-card {
            background: linear-gradient(145deg, var(--color-fondo) 0%, var(--color-fondo-claro) 100%);
            border: 1px solid rgba(var(--principal-rgb), 0.22);
            border-radius: var(--card-radius);
            padding: 32px 28px;
            color: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.07);
            position: relative; overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        /* franja de acento en la parte superior */
        .wallet-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent 0%, var(--color-acento) 50%, transparent 100%);
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
        .card-content { position: relative; z-index: 1; }

        /* ── ESTILO NEON ── */
        body.estilo-neon .wallet-card {
            border-color: rgba(var(--acento-rgb), 0.3);
            box-shadow:
                0 0 0 1px rgba(var(--acento-rgb), 0.15),
                0 0 50px rgba(var(--acento-rgb), 0.12),
                0 20px 60px rgba(0,0,0,0.85),
                inset 0 1px 0 rgba(255,255,255,0.07);
        }
        body.estilo-neon .logo-text {
            text-shadow: 0 0 14px var(--color-acento), 0 0 30px rgba(var(--acento-rgb), 0.5);
        }
        body.estilo-neon .title {
            text-shadow: 0 0 10px rgba(var(--acento-rgb), 0.8);
        }
        body.estilo-neon .btn-primary {
            box-shadow: 0 8px 28px rgba(var(--acento-rgb), 0.5);
        }
        body.estilo-neon .social-icon {
            box-shadow: 0 0 12px rgba(var(--acento-rgb), 0.3);
        }
        body.estilo-neon .detail-value a {
            text-shadow: 0 0 8px rgba(var(--acento-rgb), 0.5);
        }
        body.estilo-neon .wallet-card::before {
            height: 4px;
            box-shadow: 0 0 10px var(--color-acento);
        }

        /* ── ESTILO MINIMAL ── */
        body.estilo-minimal .wallet-card {
            border-color: rgba(255,255,255,0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        body.estilo-minimal .wallet-card::before { display: none; }
        body.estilo-minimal .card-header { margin-bottom: 20px; padding-bottom: 16px; }
        body.estilo-minimal .divider { opacity: 0.35; margin: 16px 0; }
        body.estilo-minimal .card-main { margin-bottom: 20px; }

        /* ── HEADER ── */
        .card-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 28px; padding-bottom: 18px;
            border-bottom: 1px solid rgba(var(--principal-rgb), 0.12);
        }
        .logo-section { display: flex; flex-direction: column; align-items: flex-start; }
        .logo-text {
            font-size: 22px; font-weight: 800; letter-spacing: 1px;
            color: var(--color-acento);
            margin-bottom: 4px;
        }
        .company-name {
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
            color: rgba(255,255,255,0.4); font-weight: 500;
        }
        .card-type {
            font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
            color: rgba(var(--principal-rgb), 0.75); font-weight: 600;
            background: rgba(var(--principal-rgb), 0.08);
            padding: 6px 12px; border-radius: 8px;
            border: 1px solid rgba(var(--principal-rgb), 0.2);
        }

        /* ── DATOS PRINCIPALES ── */
        .card-main { margin-bottom: 26px; }
        .name { font-size: 26px; font-weight: 700; margin-bottom: 6px; color: #fff; }
        .title { font-size: 13px; color: var(--color-acento); font-weight: 600; letter-spacing: 0.5px; }
        .company { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 4px; }

        /* ── QR ── */
        .qr-section {
            text-align: center; margin-bottom: 22px; padding: 18px;
            background: rgba(255,255,255,0.97); border-radius: var(--item-radius);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .qr-image { width: 156px; height: 156px; margin: 0 auto 10px; }
        .qr-image img { width: 100%; height: 100%; object-fit: contain; }
        .qr-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(0,0,0,0.4); font-weight: 600; }

        /* ── DETALLES ── */
        .card-details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
        .detail-item {
            background: rgba(var(--principal-rgb), 0.06);
            border: 1px solid rgba(var(--principal-rgb), 0.12);
            border-radius: var(--item-radius); padding: 13px;
        }
        .detail-label {
            font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase;
            color: rgba(var(--principal-rgb), 0.7); margin-bottom: 5px; font-weight: 600;
        }
        .detail-value { font-size: 12px; font-weight: 600; color: #fff; }
        .detail-value a { color: var(--color-acento); text-decoration: none; }

        /* ── DIVISOR ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(var(--principal-rgb), 0.18), transparent);
            margin: 18px 0;
        }

        /* ── BOTONES ── */
        .action-buttons { display: flex; gap: 12px; margin-top: 18px; }
        .btn {
            flex: 1; padding: 14px; border: none; border-radius: var(--item-radius);
            font-size: 13px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--color-acento) 0%, var(--color-acento-claro) 100%);
            color: var(--color-fondo);
            box-shadow: 0 8px 24px rgba(var(--acento-rgb), 0.3);
        }
        .btn-primary:active { transform: scale(0.96); }
        .btn-secondary {
            background: rgba(var(--principal-rgb), 0.1);
            color: var(--color-principal);
            border: 1px solid rgba(var(--principal-rgb), 0.25);
        }
        .btn-secondary:active { background: rgba(var(--principal-rgb), 0.2); }

        /* ── REDES SOCIALES ── */
        .social-icons { display: flex; gap: 12px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
        .social-icon {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(var(--acento-rgb), 0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 700; text-decoration: none;
            border: 1px solid rgba(var(--acento-rgb), 0.28);
            color: var(--color-acento);
            transition: background 0.2s, transform 0.15s;
        }
        .social-icon:active { background: rgba(var(--acento-rgb), 0.22); transform: scale(0.92); }

        /* ── FOOTER ── */
        .card-footer {
            display: flex; justify-content: space-between; padding-top: 14px; margin-top: 14px;
            border-top: 1px solid rgba(var(--principal-rgb), 0.1);
            font-size: 10px; color: rgba(255,255,255,0.35);
        }

        .loading { text-align: center; color: rgba(255,255,255,0.5); padding: 40px; }
        .error { color: #ff6b6b; text-align: center; padding: 40px; line-height: 1.6; }
        .error code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    </style>
    <script src="datos.js"></script>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading">Cargando tarjeta...</div>
        <div id="card" style="display: none;">
            <div class="wallet-card">
                <div class="card-content">
                    <div class="card-header">
                        <div class="logo-section">
                            <div class="logo-text" id="empresa-siglas"></div>
                            <div class="company-name" id="empresa-nombre"></div>
                        </div>
                        <div class="card-type">PASS</div>
                    </div>
                    <div class="divider"></div>
                    <div class="card-main">
                        <h1 class="name" id="nombre-display"></h1>
                        <p class="title" id="puesto-display"></p>
                        <p class="company" id="empresa-display"></p>
                    </div>
                    <div class="qr-section">
                        <div class="qr-image" id="qr-image"></div>
                        <div class="qr-label">Escanea para guardar</div>
                    </div>
                    <div class="card-details" id="card-details"></div>
                    <div class="divider"></div>
                    <div class="social-icons" id="social-icons"></div>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="descargarVCard()">&#x2B07;&#xFE0F; Guardar</button>
                        <button class="btn btn-secondary" onclick="compartir()">&#x1F4E4; Compartir</button>
                    </div>
                    <div class="card-footer">
                        <span>&copy; 2025</span>
                        <span id="empresa-footer"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return `${r}, ${g}, ${b}`;
        }
        function lightenHex(hex, factor) {
            let r = parseInt(hex.slice(1,3), 16);
            let g = parseInt(hex.slice(3,5), 16);
            let b = parseInt(hex.slice(5,7), 16);
            r = Math.min(255, Math.round(r + (255-r)*factor));
            g = Math.min(255, Math.round(g + (255-g)*factor));
            b = Math.min(255, Math.round(b + (255-b)*factor));
            return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
        }
        function darkenHex(hex, factor) {
            let r = parseInt(hex.slice(1,3), 16);
            let g = parseInt(hex.slice(3,5), 16);
            let b = parseInt(hex.slice(5,7), 16);
            r = Math.max(0, Math.round(r*(1-factor)));
            g = Math.max(0, Math.round(g*(1-factor)));
            b = Math.max(0, Math.round(b*(1-factor)));
            return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
        }

        function aplicarColores() {
            const d = (typeof datos !== 'undefined' && datos.diseno) ? datos.diseno : {};
            const principal = d.colorPrincipal || '#d4af37';
            const fondo    = d.colorFondo    || '#1a1a1a';
            const acento   = d.colorAcento   || '#764ba2';
            const root = document.documentElement;

            root.style.setProperty('--color-principal',       principal);
            root.style.setProperty('--color-principal-claro', lightenHex(principal, 0.25));
            root.style.setProperty('--color-fondo',           fondo);
            root.style.setProperty('--color-fondo-claro',     lightenHex(fondo, 0.4));
            root.style.setProperty('--color-fondo-oscuro',    darkenHex(fondo, 0.35));
            root.style.setProperty('--color-acento',          acento);
            root.style.setProperty('--color-acento-claro',    lightenHex(acento, 0.28));
            root.style.setProperty('--principal-rgb',         hexToRgb(principal));
            root.style.setProperty('--acento-rgb',            hexToRgb(acento));
            root.style.setProperty('--fondo-rgb',             hexToRgb(fondo));

            // border-radius personalizable
            if (d.borderRadius !== undefined) {
                const r = parseInt(d.borderRadius);
                root.style.setProperty('--card-radius', r + 'px');
                root.style.setProperty('--item-radius', Math.max(6, r - 6) + 'px');
            }

            // estilo visual
            const estilo = d.estilo || 'clasico';
            document.body.classList.add('estilo-' + estilo);
        }

        function crearDetalleItem(label, valor, href) {
            const div = document.createElement('div');
            div.className = 'detail-item';
            const labelDiv = document.createElement('div');
            labelDiv.className = 'detail-label';
            labelDiv.textContent = label;
            const valueDiv = document.createElement('div');
            valueDiv.className = 'detail-value';
            if (href) {
                const a = document.createElement('a');
                a.href = href;
                a.textContent = valor;
                if (href.startsWith('http')) a.target = '_blank';
                valueDiv.appendChild(a);
            } else {
                valueDiv.textContent = valor;
            }
            div.appendChild(labelDiv);
            div.appendChild(valueDiv);
            return div;
        }

        function mostrarTarjeta() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('card').style.display = 'block';

            aplicarColores();

            const siglas = datos.nombre
                ? datos.nombre.split(' ').map(p => p[0]).join('').substring(0,2).toUpperCase()
                : '??';
            document.getElementById('empresa-siglas').textContent = siglas;
            document.getElementById('empresa-nombre').textContent = datos.empresa || '';
            document.getElementById('nombre-display').textContent = datos.nombre || 'Sin nombre';
            document.getElementById('puesto-display').textContent = datos.puesto || '';
            document.getElementById('empresa-display').textContent = datos.empresa || '';
            document.getElementById('empresa-footer').textContent = datos.empresa || '';

            const detalles = document.getElementById('card-details');
            detalles.innerHTML = '';
            if (datos.telefonoCompleto) {
                detalles.appendChild(crearDetalleItem(
                    'Teléfono',
                    datos.telefonoMostrado || datos.telefonoCompleto,
                    `tel:${datos.telefonoCompleto}`
                ));
            }
            if (datos.email) {
                const emailCorto = datos.email.length > 18 ? datos.email.substring(0,15) + '...' : datos.email;
                detalles.appendChild(crearDetalleItem('Email', emailCorto, `mailto:${datos.email}`));
            }
            if (datos.web) {
                const webCorta = datos.web.replace(/^https?:\/\//, '').substring(0,18);
                detalles.appendChild(crearDetalleItem('Web', webCorta, datos.web));
            }
            if (datos.ubicacion) {
                detalles.appendChild(crearDetalleItem('Ubicación', datos.ubicacion));
            }

            const socialContainer = document.getElementById('social-icons');
            socialContainer.innerHTML = '';
            if (datos.redes) {
                if (datos.redes.linkedin) {
                    const a = document.createElement('a');
                    a.href = datos.redes.linkedin.startsWith('http') ? datos.redes.linkedin : 'https://' + datos.redes.linkedin;
                    a.target = '_blank'; a.className = 'social-icon';
                    a.textContent = 'in'; a.title = 'LinkedIn';
                    socialContainer.appendChild(a);
                }
                if (datos.redes.github) {
                    const a = document.createElement('a');
                    a.href = datos.redes.github; a.target = '_blank';
                    a.className = 'social-icon'; a.innerHTML = '&#x2699;&#xFE0F;'; a.title = 'GitHub';
                    socialContainer.appendChild(a);
                }
                if (datos.redes.instagram) {
                    const a = document.createElement('a');
                    a.href = `https://instagram.com/${datos.redes.instagram.replace('@','')}`;
                    a.target = '_blank'; a.className = 'social-icon';
                    a.innerHTML = '&#x1F4F7;'; a.title = 'Instagram';
                    socialContainer.appendChild(a);
                }
                if (datos.redes.twitter || datos.redes.x) {
                    const a = document.createElement('a');
                    const handle = (datos.redes.twitter || datos.redes.x).replace('@','');
                    a.href = `https://x.com/${handle}`;
                    a.target = '_blank'; a.className = 'social-icon';
                    a.textContent = 'X'; a.title = 'X / Twitter';
                    socialContainer.appendChild(a);
                }
            }
        }

        function generarVCard() {
            const redes = datos.redes || {};
            const apellido = datos.nombre ? datos.nombre.split(' ').slice(-1)[0] : '';
            const primero  = datos.nombre ? datos.nombre.split(' ')[0] : '';
            let vcard = `BEGIN:VCARD\r\nVERSION:3.0\r\nFN:${datos.nombre || ''}\r\nN:${apellido};${primero};;;\r\n`;
            if (datos.telefonoCompleto) vcard += `TEL;TYPE=CELL:${datos.telefonoCompleto}\r\n`;
            if (datos.email)           vcard += `EMAIL;TYPE=INTERNET:${datos.email}\r\n`;
            if (datos.empresa)         vcard += `ORG:${datos.empresa}\r\n`;
            if (datos.puesto)          vcard += `TITLE:${datos.puesto}\r\n`;
            if (datos.web)             vcard += `URL;TYPE=WORK:${datos.web}\r\n`;
            if (redes.linkedin)        vcard += `URL;TYPE=PROFILE:${redes.linkedin}\r\n`;
            if (redes.github)          vcard += `URL;TYPE=PROFILE:${redes.github}\r\n`;
            if (datos.descripcion)     vcard += `NOTE:${datos.descripcion}\r\n`;
            vcard += `REV:${new Date().toISOString().split('T')[0]}\r\nEND:VCARD`;
            return vcard;
        }

        function generarQR() {
            const vcard = generarVCard();
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(vcard)}`;
            const img = document.createElement('img');
            img.src = url; img.alt = 'QR Code';
            img.style.width = '100%'; img.style.height = 'auto';
            const container = document.getElementById('qr-image');
            container.innerHTML = '';
            container.appendChild(img);
        }

        function descargarVCard() {
            const vcard = generarVCard();
            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${(datos.nombre || 'contacto').replace(/\s/g,'_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function compartir() {
            if (navigator.share) {
                navigator.share({
                    title: datos.nombre || 'Tarjeta de contacto',
                    text: [datos.puesto, datos.empresa].filter(Boolean).join(' - '),
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => alert('Enlace copiado'));
            }
        }

        window.addEventListener('load', function () {
            if (typeof datos === 'undefined') {
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        Error: no se encontr&oacute; <code>datos.js</code><br>
                        <small>Aseg&uacute;rate de que <code>datos.js</code> est&aacute; en la misma carpeta que <code>index.html</code></small>
                    </div>`;
                return;
            }
            if (!datos.nombre) {
                document.getElementById('loading').innerHTML = `
                    <div class="error">Falta el campo <code>nombre</code> en <code>datos.js</code></div>`;
                return;
            }
            mostrarTarjeta();
            generarQR();
        });
    </script>
</body>
</html>
